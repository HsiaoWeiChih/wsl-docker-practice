version: '3.8'

services:
  db:
    image: postgres:15
    container_name: my-postgres-db
    restart: always
    environment:
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    image: my-best-api:v1
    container_name: fastapi-service-compose
    ports:
      - "18000:8000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_PASS=mypassword
    depends_on:
      - db

volumes:
  postgres_data: